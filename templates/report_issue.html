{% extends 'layout.html' %}

{% block title %}
Report Issue
{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg p-4 p-md-5 report-card">

<div class="report-header mb-4">

    <div class="report-icon mb-3">
        <i class="fas fa-exclamation-circle"></i>
    </div>

    <h2 class="text-success fw-bold mb-2">
        Report Sustainability Issue
    </h2>

    <p class="text-muted mb-0">
        Help us keep the campus sustainable —
        let us know what needs attention.
    </p>

</div>

<form method="POST" class="report-form">

<div class="mb-4">

<label class="form-label">
    <i class="fas fa-heading me-2 text-success"></i>Issue Title
</label>

<input
type="text"
name="title"
class="form-control"
placeholder="Example: Major Water Leakage"
required>

</div>

<div class="mb-4">

<label class="form-label">
    <i class="fas fa-align-left me-2 text-success"></i>Issue Description
</label>

<textarea
name="description"
rows="6"
class="form-control"
placeholder="Describe the issue in detail..."
required></textarea>

</div>

<button
class="btn btn-success btn-lg w-100 submit-btn">

<i class="fas fa-paper-plane me-2"></i>Submit Report

</button>

</form>

</div>

</div>

</div>

</div>

<style>

.report-card {
    border-radius: 24px;
    border: 1px solid rgba(25,135,84,0.08);
}

.report-header {
    text-align: center;
}

.report-icon {
    width: 70px;
    height: 70px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    color: white;
    background: linear-gradient(135deg, #198754, #20c997);
    border-radius: 50%;
    box-shadow: 0 8px 20px rgba(25,135,84,0.3);
}

.report-form .form-label {
    font-weight: 600;
    color: #2d3436;
    margin-bottom: 8px;
}

.report-form .form-control {
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid #dfe9e5;
    transition: all 0.25s ease;
}

.report-form .form-control:focus {
    border-color: #198754;
    box-shadow: 0 0 0 4px rgba(25,135,84,0.12);
}

.report-form textarea.form-control {
    resize: vertical;
}

.submit-btn {
    border-radius: 14px;
    padding: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    background: linear-gradient(135deg, #198754, #20c997);
    border: none;
    box-shadow: 0 8px 20px rgba(25,135,84,0.3);
    transition: all 0.3s ease;
}

.submit-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 26px rgba(25,135,84,0.4);
    background: linear-gradient(135deg, #157347, #198754);
}

</style>

{% endblock %}
